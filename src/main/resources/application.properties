server.port=8080
spring.application.name=social-media-analytics

# Database Connection Settings
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5434}/${DB_NAME:social_media_hms}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA & Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Swagger OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.tags-sorter=alpha

# JWT Security Configurations
app.jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
app.jwt.expiration-ms=86400000

# File Upload Limit (for reports if needed)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# OAuth Client Credentials Settings
oauth.instagram.client-id=${OAUTH_INSTAGRAM_CLIENT_ID:instagram_dummy_id}
oauth.instagram.client-secret=${OAUTH_INSTAGRAM_CLIENT_SECRET:instagram_dummy_secret}
oauth.instagram.redirect-uri=${OAUTH_INSTAGRAM_REDIRECT_URI:http://localhost:8080/api/oauth/instagram/callback}

oauth.facebook.client-id=${OAUTH_FACEBOOK_CLIENT_ID:facebook_dummy_id}
oauth.facebook.client-secret=${OAUTH_FACEBOOK_CLIENT_SECRET:facebook_dummy_secret}
oauth.facebook.redirect-uri=${OAUTH_FACEBOOK_REDIRECT_URI:http://localhost:8080/api/oauth/facebook/callback}

oauth.linkedin.client-id=${OAUTH_LINKEDIN_CLIENT_ID:linkedin_dummy_id}
oauth.linkedin.client-secret=${OAUTH_LINKEDIN_CLIENT_SECRET:linkedin_dummy_secret}
oauth.linkedin.redirect-uri=${OAUTH_LINKEDIN_REDIRECT_URI:http://localhost:8080/api/oauth/linkedin/callback}

oauth.x.client-id=${OAUTH_X_CLIENT_ID:x_dummy_id}
oauth.x.client-secret=${OAUTH_X_CLIENT_SECRET:x_dummy_secret}
oauth.x.redirect-uri=${OAUTH_X_REDIRECT_URI:http://localhost:8080/api/oauth/x/callback}

oauth.frontend-redirect-uri=${OAUTH_FRONTEND_REDIRECT_URI:http://localhost:3000/accounts}


# Enable Logging level
logging.level.org.springframework.security=INFO
logging.level.com.social.analytics=DEBUG
